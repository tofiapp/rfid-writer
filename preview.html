<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=430, initial-scale=1">
<title>RFID Writer – Preview</title>
<style>
  :root {
    --color-primary: #006494;
    --color-primary-dark: #004B71;
    --color-primary-container: #C8E6FF;
    --color-accent: #E65100;
    --color-accent-container: #FFDBCC;
    --color-bg: #F4F6F8;
    --color-card: #FFFFFF;
    --color-text: #1B1B1F;
    --color-text-muted: #5C6670;
    --color-text-on-primary: #FFFFFF;
    --color-success: #2E7D32;
    --color-error: #B71C1C;
    --color-lock: #4A148C;
    --color-border: #E2E6EB;
    --color-epc-text: #7FE0FF;
    --color-epc-bg: #0D2A4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #D0D5DC;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .phone-frame {
    background: var(--color-card);
    border-radius: 40px;
    padding: 14px;
    box-shadow: 0 0 0 2px var(--color-border), 0 20px 60px rgba(0,0,0,.15);
    width: 390px;
  }

  .phone-screen {
    background: var(--color-bg);
    border-radius: 28px;
    overflow: hidden;
    position: relative;
  }

  .status-bar {
    background: var(--color-primary-dark);
    color: var(--color-text-on-primary);
    font-size: 11px;
    padding: 6px 16px;
    display: flex;
    justify-content: space-between;
  }

  .app-header {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--color-card);
    padding: 10px 8px 10px 16px;
    border-bottom: 1px solid var(--color-border);
  }

  .app-header-logo {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: center;
  }

  .app-header-logo img,
  .app-header-logo object {
    display: block;
    height: 32px;
    width: auto;
    max-width: 100%;
  }

  .app-header-settings {
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: var(--color-text-muted);
    font-size: 22px;
    line-height: 1;
    cursor: default;
    padding: 0;
    flex: 0 0 auto;
  }

  .app-status {
    font-size: 12px;
    white-space: nowrap;
    flex: 0 0 auto;
  }

  .app-content {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 0;
    min-height: 720px;
  }

  .btn {
    width: 100%;
    height: 52px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity .15s, transform .1s;
    margin-bottom: 16px;
    letter-spacing: .3px;
  }
  .btn:active { opacity: .8; transform: scale(.98); }

  .btn-scan  { background: var(--color-primary); color: var(--color-text-on-primary); }
  .btn-scan.scanning { background: var(--color-error); }
  .btn-write { background: var(--color-accent); color: var(--color-text-on-primary); }
  .btn-write:disabled { background: var(--color-accent-container); color: var(--color-text-muted); cursor: default; }

  .card {
    background: var(--color-card);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
  }

  .card-label {
    color: var(--color-text-muted);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-value {
    color: var(--color-primary);
    font-size: 17px;
    font-family: 'Consolas', monospace;
    word-break: break-all;
    margin-bottom: 2px;
  }

  .card-value.muted { color: var(--color-success); font-size: 13px; }

  .card-sublabel {
    color: var(--color-text-muted);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  .input-field {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--color-border);
    color: var(--color-text);
    font-size: 14px;
    font-family: 'Consolas', monospace;
    width: 100%;
    padding: 6px 0;
    outline: none;
    margin-top: 6px;
  }
  .input-field::placeholder { color: var(--color-text-muted); }
  .input-field:focus { border-bottom-color: var(--color-primary); }

  .lock-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .btn-lock {
    flex: 1;
    height: 44px;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
    color: var(--color-text-on-primary);
  }
  .btn-lock:disabled { opacity: .35; cursor: default; }
  .btn-lock-epc  { background: var(--color-lock); }
  .btn-lock-all  { background: var(--color-error); }

  .log-container {
    flex: 1;
    background: var(--color-epc-bg);
    border-radius: 12px;
    padding: 8px;
    overflow-y: auto;
    min-height: 130px;
    max-height: 160px;
    margin-top: 4px;
  }

  .log-line {
    color: var(--color-epc-text);
    font-size: 11px;
    font-family: 'Consolas', monospace;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .demo-badge {
    position: fixed;
    top: 12px;
    right: 16px;
    background: var(--color-accent);
    color: var(--color-text-on-primary);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: .5px;
  }
</style>
</head>
<body>

<div class="demo-badge">UI PREVIEW</div>

<div class="phone-frame">
  <div class="phone-screen">

    <div class="status-bar">
      <span>09:41</span>
      <span>▲ ● ■  100%</span>
    </div>

    <div class="app-header">
      <div class="app-header-logo">
        <picture>
          <source srcset="app-logo.svg" type="image/svg+xml">
          <img src="preview-logo.png" alt="RFID Writer">
        </picture>
      </div>
      <button class="app-header-settings" type="button" aria-label="Nastavení">⚙</button>
      <div class="app-status" id="statusText" style="color:#E65100">● Inicializace...</div>
    </div>

    <div class="app-content">

      <!-- Scan button -->
      <button class="btn btn-scan" id="btnScan" onclick="toggleScan()">📡&nbsp; SKENOVAT TAG</button>

      <!-- Current EPC card -->
      <div class="card">
        <div class="card-label">Aktuální EPC</div>
        <div class="card-value" id="tvEpc">—</div>
        <div class="card-sublabel">TID</div>
        <div class="card-value muted" id="tvTid">—</div>
      </div>

      <!-- New EPC input -->
      <div class="card">
        <div class="card-label">Nový EPC (hex, bez mezer)</div>
        <input class="input-field" id="etNewEpc" placeholder="např. E28011700000020F33A81001" maxlength="64" oninput="checkWrite()">
        <button class="btn btn-write" id="btnWrite" disabled onclick="doWrite()" style="margin-top:10px;margin-bottom:0">✏️&nbsp; ZAPSAT EPC</button>
      </div>

      <!-- Password / Lock card -->
      <div class="card">
        <div class="card-label">Zaheslování tagu</div>
        <input class="input-field" id="etPwd" placeholder="Access password (8 hex znaků, prázdné = 00000000)" maxlength="8">
        <div class="lock-row">
          <button class="btn-lock btn-lock-epc" id="btnLockEpc" disabled onclick="doLock(false)">🔒 Lock EPC</button>
          <button class="btn-lock btn-lock-all" id="btnLockAll" disabled onclick="doLock(true)">🔐 Lock ALL</button>
        </div>
      </div>

      <!-- Log -->
      <div class="log-container" id="logBox">
        <div class="log-line" id="logContent"></div>
      </div>

    </div>
  </div>
</div>

<script>
  let scanning = false;
  let tagFound = false;
  let logLines = [];

  function ts() {
    return new Date().toTimeString().slice(0,8);
  }

  function log(msg) {
    logLines.push('[' + ts() + '] ' + msg);
    document.getElementById('logContent').textContent = logLines.join('\n');
    const box = document.getElementById('logBox');
    box.scrollTop = box.scrollHeight;
  }

  function setStatus(text, color) {
    const el = document.getElementById('statusText');
    el.textContent = text;
    el.style.color = color;
  }

  function checkWrite() {
    const val = document.getElementById('etNewEpc').value.trim();
    document.getElementById('btnWrite').disabled = !(tagFound && val.length > 0);
  }

  function enableActionButtons(enabled) {
    document.getElementById('btnLockEpc').disabled = !enabled;
    document.getElementById('btnLockAll').disabled = !enabled;
    checkWrite();
  }

  // Simulate init
  window.onload = () => {
    setTimeout(() => {
      setStatus('● Připojeno — Chainway C5', '#2E7D32');
      log('SDK inicializováno OK');
    }, 1200);
  };

  function toggleScan() {
    if (scanning) {
      stopScan();
    } else {
      startScan();
    }
  }

  function startScan() {
    scanning = true;
    const btn = document.getElementById('btnScan');
    btn.textContent = '⏹  ZASTAVIT';
    btn.className = 'btn btn-scan scanning';
    setStatus('● Skenování...', '#006494');
    log('Zahájeno skenování...');

    // Simulate finding a tag after 1.5s
    setTimeout(() => {
      if (!scanning) return;
      const fakeEpc = 'E28011700000020F33A8' + Math.floor(Math.random()*9000+1000);
      const fakeTid = 'E2003412012345' + Math.floor(Math.random()*9000+1000);
      onTagFound(fakeEpc, fakeTid);
    }, 1500);
  }

  function stopScan() {
    scanning = false;
    const btn = document.getElementById('btnScan');
    btn.textContent = '📡\u00A0 SKENOVAT TAG';
    btn.className = 'btn btn-scan';
    setStatus('● Připojeno — Chainway C5', '#2E7D32');
  }

  function onTagFound(epc, tid) {
    stopScan();
    tagFound = true;
    document.getElementById('tvEpc').textContent = epc;
    document.getElementById('tvTid').textContent = tid;
    enableActionButtons(true);
    log('TAG nalezen — EPC: ' + epc);
    log('              TID: ' + tid);
  }

  function doWrite() {
    const newEpc = document.getElementById('etNewEpc').value.trim().toUpperCase().replace(/\s/g,'');
    if (!newEpc) return;
    if (newEpc.length % 4 !== 0) { log('✗ EPC musí mít délku dělitelnou 4'); return; }
    if (!/^[0-9A-F]+$/.test(newEpc)) { log('✗ EPC smí obsahovat pouze hex znaky'); return; }

    setStatus('● Zapisuji...', '#E65100');
    log('Zapisuji EPC: ' + newEpc);
    document.getElementById('btnWrite').disabled = true;

    setTimeout(() => {
      document.getElementById('tvEpc').textContent = newEpc;
      document.getElementById('btnWrite').disabled = false;
      setStatus('● EPC zapsáno OK', '#2E7D32');
      log('✓ EPC úspěšně zapsáno: ' + newEpc);
    }, 900);
  }

  function doLock(all) {
    const label = all ? '(kompletní lock)' : '(jen EPC)';
    setStatus('● Zamykám...', '#4A148C');
    log('Zamykám tag ' + label + '...');
    document.getElementById('btnLockEpc').disabled = true;
    document.getElementById('btnLockAll').disabled = true;

    setTimeout(() => {
      enableActionButtons(true);
      setStatus('● Tag zamčen', '#2E7D32');
      log('✓ Tag úspěšně zamčen ' + label);
    }, 900);
  }
</script>
</body>
</html>
